<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Couple Canvas 💛</title>

<style>
body { margin:0; text-align:center; font-family:sans-serif; }
canvas { border:1px solid #ccc; touch-action:none; }
button { margin:10px; padding:10px; }
</style>

</head>
<body>

<h2>Couple Canvas 💛</h2>
<canvas id="canvas" width="350" height="500"></canvas><br>
<button onclick="clearCanvas()">Clear</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "あなたのAPIキー",
  authDomain: "あなたのauthDomain",
  projectId: "あなたのprojectId",
  storageBucket: "あなたのstorageBucket",
  messagingSenderId: "あなたのmessagingSenderId",
  appId: "あなたのappId"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 60;

let drawing = false;

canvas.addEventListener("mousedown", () => drawing = true);
canvas.addEventListener("mouseup", () => {
  drawing = false;
  saveDrawing();
});
canvas.addEventListener("mousemove", draw);

canvas.addEventListener("touchstart", () => drawing = true);
canvas.addEventListener("touchend", () => {
  drawing = false;
  saveDrawing();
});
canvas.addEventListener("touchmove", draw);

function draw(e) {
  if (!drawing) return;

  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.strokeStyle = "black";

  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

async function saveDrawing() {
  const image = canvas.toDataURL();
  await setDoc(doc(db, "canvas", "shared"), { image });
}

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  deleteDoc(doc(db, "canvas", "shared"));
}

window.clearCanvas = clearCanvas;

onSnapshot(doc(db, "canvas", "shared"), (docSnap) => {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (docSnap.exists()) {
    const data = docSnap.data();
    if (data.image) {
      const img = new Image();
      img.src = data.image;
      img.onload = () => {
        ctx.drawImage(img, 0, 0);
      };
    }
  }
});
function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  setDoc(doc(db, "canvas", "shared"), {
    image: ""
  }, { merge: false });
}
  window.clearCanvas = clearCanvas;
</script>

</body>
</html>
