<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Couple Canvas 💛</title>

<style>
body { margin:0; text-align:center; font-family:sans-serif; }
canvas { border:1px solid #ccc; touch-action:none; }
button { margin:10px; padding:10px; }
</style>

</head>
<body>

<h2>Couple Canvas 💛</h2>
<canvas id="canvas" width="350" height="500"></canvas><br>
<button onclick="clearCanvas()">Clear</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBotWG-0IhjSEjV64bBxKUKWHyp8nOZHM",
  authDomain: "coupleboard-c8503.firebaseapp.com",
  projectId: "coupleboard-c8503",
  storageBucket: "coupleboard-c8503.firebasestorage.app",
  messagingSenderId: "833596379920",
  appId: "1:833596379920:web:7920359a63a020af688b95",
  measurementId: "G-TBR7Y6NJRW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.lineWidth = 3;
ctx.lineCap = "round";

let drawing = false;

canvas.addEventListener("pointerdown", e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
});

canvas.addEventListener("pointermove", e => {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  saveDrawing();
});

canvas.addEventListener("pointerup", () => drawing = false);
canvas.addEventListener("pointerleave", () => drawing = false);

async function saveDrawing() {
  await setDoc(doc(db, "canvas", "shared"), {
    image: canvas.toDataURL()
  });
}

onSnapshot(doc(db, "canvas", "shared"), (docSnap) => {
  const data = docSnap.data();

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (data && data.image && data.image !== "") {
    const img = new Image();
    img.src = data.image;
    img.onload = () => {
      ctx.drawImage(img, 0, 0);
    };
  }
});

function clearCanvas() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  setDoc(doc(db, "canvas", "shared"), {
    image: ""
  }, { merge: false });
}
</script>

</body>
</html>
